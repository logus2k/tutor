# Container nginx for the Tutor app.
#
# Serves the static frontend at the web root and reverse-proxies the ETL backend
# under /etl/ (REST + the socket.io upgrade). The domain proxy routes /tutor/
# here with the prefix stripped, so requests arrive as /, /css/..., /js/...,
# /data/..., /etl/... .
server {
    listen 80;
    server_name _;

    root /app/frontend;
    index index.html;

    add_header Cache-Control "no-store";

    # Document uploads (PDFs) POST to /etl/jobs; nginx's 1m default → 413.
    client_max_body_size 100m;

    # Package content + catalog index are PRIVATE-aware: served ONLY via the
    # authenticated /etl/catalog and /etl/packages/{id}/content endpoints, never as
    # static files (a direct fetch would otherwise bypass the visibility checks).
    location /data/packages/ { return 404; }

    # Other runtime content (documents indexes, etc.) — bind-mounted rw.
    location /data/ {
        alias /app/data/;
        add_header Cache-Control "no-store";
    }

    # ETL backend (FastAPI + socket.io) on the in-container uvicorn.
    location /etl/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;          # socket.io websocket upgrade
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 3600s;                        # long-running ingestion jobs
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
