# Container nginx for the Tutor static frontend.
#
# Serves at the web root. The domain proxy (proxy_server) routes /tutor/ here
# with the prefix stripped, so requests arrive as /, /css/..., /js/...,
# /packages/..., /vendor/... — all plain static files.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache during active development so edits show on reload.
    add_header Cache-Control "no-store";

    location / {
        try_files $uri $uri/ =404;
    }
}
