# Tutor — static ES6 frontend + ETL backend (FastAPI/socket.io) + docling, one
# container fronted by the domain proxy (reaches it at host.docker.internal:4930).
#
# The browser reaches agent_server via the proxy's /llm/ path; the in-container
# ETL backend reaches agent_server at host.docker.internal:7701.
services:
  tutor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor
    ports:
      - "4930:80"
    volumes:
      # Runtime content (packages/documents/jobs) — read-WRITE so the ETL backend
      # can publish packages and update the indexes without an image rebuild.
      - ./data:/app/data
      # docling models, shared with noted-graph (read-only).
      - /home/logus/env/assets/noted/data/models:/data/models:ro
    environment:
      - ETL_API=http://host.docker.internal:7701/v1/chat/completions
      - ETL_DOCLING_MODE=local
      - DOCLING_MODELS=/data/models/docling/models
      - ETL_DOCLING_DEVICE=auto      # CPU build → cpu; see README for the GPU upgrade
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
