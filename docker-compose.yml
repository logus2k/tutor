# Tutor — static ES6 frontend + ETL backend (FastAPI/socket.io) + docling, one
# container fronted by the domain proxy (reaches it at host.docker.internal:4930).
#
# The browser reaches agent_server via the proxy's /llm/ path; the in-container
# ETL backend reaches agent_server at host.docker.internal:7701.
services:
  tutor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor
    ports:
      - "4930:80"
    volumes:
      # Runtime content (packages/documents/jobs) — read-WRITE so the ETL backend
      # can publish packages and update the indexes without an image rebuild.
      - ./data:/app/data
      # docling models, shared with noted-graph (read-only).
      - /home/logus/env/assets/noted/data/models:/data/models:ro
    environment:
      - ETL_API=http://host.docker.internal:7701/v1/chat/completions
      - ETL_DOCLING_MODE=local
      - DOCLING_MODELS=/data/models/docling/models
      - ETL_DOCLING_DEVICE=auto      # CUDA build → uses the GPU (device reservation below)
      - TUTOR_ADMIN_EMAILS=logus2k@gmail.com   # Dispute Review admins (comma-separated)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GPU passthrough for docling (RTX 4090). Needs the NVIDIA Container Toolkit
    # (present — Docker has the nvidia runtime). torch is the CUDA build.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    # On the shared external edge network so it survives Docker/WSL restarts
    # (the previous per-project default network did not) and is reachable by
    # name for health monitoring.
    networks:
      - logus2k_network

networks:
  logus2k_network:
    external: true
