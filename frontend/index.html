<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tutor</title>
  <link rel="stylesheet" href="css/tutor.css" />
  <!-- socket.io client (only needed for TTS/STT; chat works without it).
       Loads before the module so window.io exists when chat.js runs. -->
  <script src="vendor/socket.io.min.js"></script>
</head>
<body>
  <header class="topbar">
    <button id="rail-toggle" class="rail-toggle" type="button" title="Menu" aria-label="Open menu" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      <span class="brand-mark">🎓</span>
      <div class="brand-text">
        <div id="pkg-title" class="brand-title">Tutor</div>
      </div>
    </div>
    <div id="identity" class="identity"></div>
  </header>

  <div class="workspace">
    <!-- Backdrop behind the rail drawer on mobile (tap to close). -->
    <div id="rail-backdrop" class="rail-backdrop"></div>
    <!-- Activity rail: Catalog + Documents on top, Settings at the bottom.
         On mobile this becomes a slide-in drawer toggled by the topbar hamburger. -->
    <nav class="rail" aria-label="Sections">
      <button class="rail-btn active" data-view="sessions" type="button" title="Study Sessions" aria-label="Study Sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span class="rail-label">Sessions</span>
      </button>
      <button class="rail-btn" data-view="catalog" type="button" title="Catalog" aria-label="Catalog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span class="rail-label">Catalog</span>
      </button>
      <button class="rail-btn" data-view="documents" type="button" title="Documents" aria-label="Documents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/></svg>
        <span class="rail-label">Documents</span>
      </button>

      <button class="rail-btn" id="rail-chat" type="button" title="Toggle Assistant" aria-label="Toggle Assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4"/><circle cx="9" cy="13" r="1" fill="currentColor"/><circle cx="15" cy="13" r="1" fill="currentColor"/><path d="M9.5 17h5"/></svg>
        <span class="rail-label">Assistant</span>
      </button>

      <button class="rail-btn" data-view="review" type="button" title="Review held packages" aria-label="Review">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/><path d="M9 11l3 3 8-8"/></svg>
        <span class="rail-label">Review</span>
      </button>

      <button class="rail-btn" data-view="fame" type="button" title="Wall of Fame" aria-label="Wall of Fame">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 1-3 3"/></svg>
        <span class="rail-label">Fame</span>
      </button>

      <div class="rail-spacer"></div>

      <button class="rail-btn" data-view="settings" type="button" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="rail-label">Settings</span>
      </button>
    </nav>

    <main id="split" class="split chat-collapsed">
      <section id="left" class="pane pane-left">
        <!-- Study Sessions: per-student, server-persisted workspaces. -->
        <div id="view-sessions" class="leftview">
          <div id="sessions-panel"></div>
        </div>

        <!-- Questions: the selected package's questions. -->
        <div id="view-questions" class="leftview hidden">
          <div id="questions" class="questions"><p class="muted">No package open. Pick one from the Catalog.</p></div>
        </div>

        <!-- Catalog: list of packages; selecting one opens it in Questions. -->
        <div id="view-catalog" class="leftview hidden">
          <div id="catalog-list" class="catalog"></div>
        </div>

        <!-- Documents: ingest new sources + list uploaded documents. -->
        <div id="view-documents" class="leftview hidden">
          <h2 class="leftview-title">Documents</h2>
          <div id="ingest" class="ingest"></div>
          <h3 class="ingest-subhead">Uploaded</h3>
          <div id="documents-list" class="catalog"></div>
        </div>

        <!-- Wall of Fame: per-package leaderboards of the best study sessions. -->
        <div id="view-fame" class="leftview hidden">
          <div id="fame-panel"></div>
        </div>

        <!-- Review: held packages — resolve key disputes, then publish. -->
        <div id="view-review" class="leftview hidden">
          <div id="review-panel"></div>
        </div>

        <!-- Settings: active agent + reasoning options. -->
        <div id="view-settings" class="leftview hidden">
          <h2 class="leftview-title">Settings</h2>
          <div class="settings">
            <div class="setting-row">
              <label for="set-agent">Assistant role</label>
              <select id="set-agent">
                <option value="instructor">📚 Instructor — explain &amp; teach</option>
                <option value="coach">🎯 Coach — practice &amp; feedback</option>
                <option value="mentor">🧭 Mentor — guide &amp; motivate</option>
              </select>
            </div>
            <label class="setting-check">
              <input type="checkbox" id="set-thinking" />
              <span><b>Thinking</b><small>Generate the model's reasoning before answering.</small></span>
            </label>
            <label class="setting-check">
              <input type="checkbox" id="set-show" />
              <span><b>Show reasoning</b><small>Display the reasoning panel in chat replies.</small></span>
            </label>
          </div>
        </div>
      </section>

      <div id="splitter" class="splitter" title="Drag to resize · double-click to reset"></div>

      <section id="right" class="pane pane-right">
        <div class="rtabs" role="tablist">
          <button class="rtab active" data-rtab="chat" type="button" role="tab" aria-selected="true">Assistant</button>
          <button class="rtab hidden" data-rtab="grounding" type="button" role="tab" aria-selected="false">Grounding</button>
          <button id="rtab-close" class="rtab-close" type="button" title="Close active tab" aria-label="Close active tab">✕</button>
        </div>
        <div id="chat" class="chat rpanel"></div>
        <div id="grounding" class="grounding rpanel hidden"></div>
      </section>
    </main>
  </div>

  <footer class="statusbar">
    <span id="sb-agent" class="sb-pill sb-pill-agent">🤖 tutor</span>
    <span id="sb-session" class="sb-pill sb-pill-pkg">🎯 No session</span>
    <span id="sb-package" class="sb-item">📦 No package</span>
    <span class="sb-spacer"></span>
    <button id="sb-notifications" class="sb-iconbtn" type="button" title="Notifications" aria-label="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <!-- Assistant connection status (LED + label) — the right bottom corner. -->
    <span id="sb-status" class="sb-pill sb-pill-status"><span id="sb-status-led" class="sb-led"></span><span id="sb-status-text">Ready</span></span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
